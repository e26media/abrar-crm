{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Create New Order (Draft)</h1>
        <a href="/orders" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">&larr; Back to Orders</a>
    </div>

    <div class="bg-white shadow sm:rounded-lg overflow-hidden">
        <form action="/orders" method="POST" class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="customer_name" class="block text-sm font-medium text-gray-700">Customer Name</label>
                    <input type="text" name="customer_name" id="customer_name" required class="mt-1 border p-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="customer_phone" class="block text-sm font-medium text-gray-700">Customer Phone (Optional)</label>
                    <input type="tel" name="customer_phone" id="customer_phone" pattern="[0-9]*" inputmode="numeric" placeholder="Numeric values only" class="mt-1 border p-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="event_name" class="block text-sm font-medium text-gray-700">Event Name</label>
                    <input type="text" name="event_name" id="event_name" required class="mt-1 border p-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="e.g. Wedding Reception">
                </div>
                <div>
                    <label for="event_date" class="block text-sm font-medium text-gray-700">Event Date</label>
                    <input type="date" name="event_date" id="event_date" required class="mt-1 border p-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div class="md:col-span-2">
                    <label for="num_plates" class="block text-sm font-medium text-gray-700">Number of Plates (Estimated)</label>
                    <input type="number" min="1" name="num_plates" id="num_plates" value="100" required class="mt-1 border p-2 block w-full md:w-1/2 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    <p class="mt-1 text-xs text-gray-500">You can adjust the plates count later on the order detail page.</p>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-200">
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Create Order Draft &amp; Select Items
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
