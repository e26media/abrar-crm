{% if not items_data %}
<div class="p-2 text-sm text-gray-500">No matching items found</div>
{% else %}
<ul class="py-1">
    {% for item in items_data %}
    {% set food = item.FoodItem %}
    {% set category = item.Category %}
    <li class="px-3 py-2 hover:bg-indigo-50 cursor-pointer flex justify-between items-center group">
        <div>
            <span class="block text-sm font-medium text-gray-900">{{ food.name }}</span>
            <span class="block text-xs text-gray-500">{{ category.name }} | ₹{{ food.base_price_per_unit }}/{{
                food.unit.value }}</span>
        </div>
        <form hx-post="/orders/{{ order_id }}/items" hx-target="#order-summary" hx-swap="outerHTML"
            class="m-0" hx-on::after-request="document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = '';">
            <input type="hidden" name="food_item_id" value="{{ food.id }}">
            <button type="submit"
                class="opacity-0 group-hover:opacity-100 px-2 py-1 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 text-xs font-semibold rounded">
                Add
            </button>
        </form>
    </li>
    {% endfor %}
</ul>
{% endif %}
