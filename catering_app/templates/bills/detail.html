{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Bill #{{ bill.id }}</h1>
        <a href="/orders/{{ bill.order_id }}" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">&larr; Back to Order</a>
    </div>

    <div class="bg-white shadow sm:rounded-lg overflow-hidden p-8 text-center border">
        <svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Bill Generated Successfully</h2>
        <p class="text-gray-500 mb-6">The bill for Order #{{ bill.order_id }} has been saved.</p>
        
        <div class="flex justify-center gap-4">
            <a href="/bills/{{ bill.id }}/pdf" download class="px-6 py-3 bg-indigo-600 text-white font-medium rounded-md hover:bg-indigo-700 shadow flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download PDF
            </a>
            <a href="/orders/{{ bill.order_id }}" class="px-6 py-3 border border-gray-300 text-gray-700 font-medium rounded-md hover:bg-gray-50 bg-white shadow-sm">
                View Order
            </a>
        </div>
    </div>
</div>
{% endblock %}
