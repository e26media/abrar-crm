{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto pb-10">

    <!-- Header -->
    <div class="mb-6 flex items-center gap-4">
        <a href="/quotations" class="inline-flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors">
            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back
        </a>
        <h1 class="text-2xl font-bold text-gray-900">New Quotation</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- ── Left: Form fields + item search ── -->
        <div class="lg:col-span-1 space-y-4">

            <!-- Customer info card -->
            <div class="bg-white shadow sm:rounded-lg p-5">
                <h3 class="text-sm font-semibold text-gray-700 mb-4 uppercase tracking-wider">Client Details</h3>
                <form id="quotation-form" action="/quotations" method="POST">

                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1" for="customer_name">Customer Name *</label>
                            <input id="customer_name" name="customer_name" type="text" required placeholder="e.g. Mr. Customer Name"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1" for="customer_phone">Customer Phone (Optional)</label>
                            <input id="customer_phone" name="customer_phone" type="tel" placeholder="e.g. 9876543210"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1" for="function_date">Function Date *</label>
                            <input id="function_date" name="function_date" type="date" required
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1" for="venue">Venue *</label>
                            <input id="venue" name="venue" type="text" required placeholder="e.g. ULLAL"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                    
                    <button type="submit"
                            class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow transition-colors">
                        Continue to Menu Details →
                    </button>
                </form>
            </div>

        </div>

        <!-- ── Right: Preview info ── -->
        <div class="lg:col-span-2">
            <div class="bg-white shadow sm:rounded-lg p-8 flex flex-col items-center justify-center text-center min-h-[300px]">
                <svg class="w-16 h-16 text-indigo-100 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">Fill in the details</h3>
                <p class="text-sm text-gray-400 max-w-sm">
                    After saving, you'll be taken to the quotation detail page where you can
                    name your menu sections and add items, then download the PDF.
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
