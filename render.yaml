services:
  - type: web
    name: catering-management
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn catering_app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catering_db
          property: connectionString
      - key: APP_NAME
        value: Catering Management System

databases:
  - name: catering_db
    plan: free