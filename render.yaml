services:
  - type: web
    name: catering-crm
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn catering_app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catering-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: catering-db
    databaseName: catering
    user: catering_user
    plan: free